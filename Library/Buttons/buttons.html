<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons</title>
    <link rel="stylesheet" href="../../Css/oemebase.css">
    <link rel="stylesheet" href="../../Css/oemebaseresponsive.css">
    <script src="allcomponents.js"></script>
</head>

<body class="oeme-body">
    <!--Without Shadow-->
    <div class="do-not-copy-1">
        <!--Here goes button group-->
        <div class="oeme-btn-grp">
            <button class="ob-btn ob-btn-primary">Primary</button>
            <button class="ob-btn ob-btn-secondary">Secondary</button>
            <button class="ob-btn ob-btn-trans-light">Trans Light</button>
            <button class="ob-btn ob-btn-trans-dark">Trans Dark</button>
            <button class="ob-btn ob-btn-critical">Critical</button>
            <button class="ob-btn ob-btn-primary" disabled>Primary Disabled</button>
            <button class="ob-btn ob-btn-secondary" disabled>Secondary
                Disabled</button>
            <button class="ob-btn ob-btn-trans-light" disabled>Trans Disabled</button>
            <button class="ob-btn-icon">
                <img src="../../Img/back.png" alt="">
            </button>
        </div>
    </div>

    <!--With Shadow-->
    <div class="do-not-copy-1">
        <!--Here goes button group-->
        <div class="oeme-btn-grp">
            <button class="ob-btn ob-btn-primary ob-btn-shadow">Primary</button>
            <button class="ob-btn ob-btn-secondary ob-btn-shadow">Secondary</button>
            <button class="ob-btn ob-btn-trans-light ob-btn-shadow">Trans Light</button>
            <button class="ob-btn ob-btn-trans-dark ob-btn-shadow">Trans Dark</button>
            <button class="ob-btn ob-btn-critical ob-btn-shadow">Critical</button>
            <button class="ob-btn ob-btn-primary ob-btn-shadow" disabled>Primary
                Disabled</button>
            <button class="ob-btn ob-btn-secondary ob-btn-shadow" disabled>Secondary
                Disabled</button>
            <button class="ob-btn ob-btn-trans-light ob-btn-shadow" disabled>Trans
                Disabled</button>
        </div>
    </div>

    <!--Large-->
    <div class="do-not-copy-1">
        <!--Here goes button group-->
        <div class="oeme-btn-grp">
            <button class="ob-btn-lg ob-btn-primary">Primary</button>
            <button class="ob-btn-lg ob-btn-secondary">Secondary</button>
            <button class="ob-btn-lg ob-btn-trans-light">Trans Light</button>
            <button class="ob-btn-lg ob-btn-trans-dark">Trans Dark</button>
            <button class="ob-btn-lg ob-btn-critical">Critical</button>
            <button class="ob-btn-lg ob-btn-primary" disabled>Primary Disabled</button>
            <button class="ob-btn-lg ob-btn-secondary" disabled>Secondary
                Disabled</button>
            <button class="ob-btn-lg ob-btn-trans-light" disabled>Trans Disabled</button>
            <button class="ob-btn-icon-lg">
                <img src="../../Img/back.png" alt="">
            </button>
        </div>
    </div>
</body>

</html>
