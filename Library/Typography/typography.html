<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typography</title>
    <link rel="stylesheet" href="../../Css/oemebase.css">
    <script src="allcomponents.js"></script>
</head>

<body class="oeme-body">
    <div class="do-not-copy-1 ob-block">
        <div class="do-not-copy-2">
            <!--Here goes spacy-nav-->
            <!--Heading Varient 1-->
            <h1 class="ob-text-xxl ob-font-normal">Oeme Heading Xxl</h1>
            <h1 class="ob-text-xl ob-font-normal">Oeme Heading Xl</h1>
            <h1 class="ob-text-lg ob-font-normal">Oeme Heading Lg</h1>
            <h1 class="ob-text-md ob-font-normal">Oeme Heading Md</h1>
            <h1 class="ob-text-sm ob-font-normal">Oeme Heading Sm</h1>

            <br>

            <!--Heading Varient 2-->
            <h1 class="ob-text-xxl ob-font-bold">Oeme Heading Xxl</h1>
            <h1 class="ob-text-xl ob-font-bold">Oeme Heading Xl</h1>
            <h1 class="ob-text-lg ob-font-bold">Oeme Heading Lg</h1>
            <h1 class="ob-text-md ob-font-bold">Oeme Heading Md</h1>
            <h1 class="ob-text-sm ob-font-bold">Oeme Heading Sm</h1>

            <br>

            <!--Paragraph Varient 2-->
            <p class="ob-text-xxl">Oeme Paragraph Xxl</p>
            <p class="ob-text-xl">Oeme Paragraph Xl</p>
            <p class="ob-text-lg">Oeme Paragraph Lg</p>
            <p class="ob-text-md">Oeme Paragraph Md</p>
            <p class="ob-text-sm">Oeme Paragraph Sm</p>
            <!--Here ends spacy-nav-->
        </div>
    </div>
</body>

</html>
